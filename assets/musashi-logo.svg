<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 920" role="img" aria-labelledby="title desc">
  <title id="title">武蔵飴 ロゴ</title>
  <desc id="desc">家紋、飴、稲穂、青海波を組み合わせた武蔵飴の和モダンロゴ</desc>
  <defs>
    <radialGradient id="candyGrad" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#fff1bc"/>
      <stop offset="38%" stop-color="#d8952d"/>
      <stop offset="72%" stop-color="#b56b22"/>
      <stop offset="100%" stop-color="#7d421a"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efc472"/>
      <stop offset="100%" stop-color="#b66b25"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#3b2014" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="920" height="920" rx="80" fill="#fff8eb"/>
  <circle cx="460" cy="360" r="290" fill="#fffdf7" opacity="0.78"/>

  <!-- outer crest -->
  <path d="M460 95 C505 150 610 116 660 205 C693 263 760 271 792 334 C742 378 777 470 704 531 C654 573 659 652 587 692 C525 726 505 785 460 826 C415 785 395 726 333 692 C261 652 266 573 216 531 C143 470 178 378 128 334 C160 271 227 263 260 205 C310 116 415 150 460 95Z" fill="none" stroke="#3b2014" stroke-width="26" stroke-linejoin="round"/>

  <!-- rice stems -->
  <g fill="none" stroke="#bf7627" stroke-width="12" stroke-linecap="round">
    <path d="M318 414 C300 337 310 266 365 215"/>
    <path d="M602 414 C620 337 610 266 555 215"/>
  </g>
  <g fill="#c47a29">
    <ellipse cx="346" cy="252" rx="13" ry="29" transform="rotate(35 346 252)"/>
    <ellipse cx="318" cy="292" rx="12" ry="27" transform="rotate(18 318 292)"/>
    <ellipse cx="306" cy="337" rx="11" ry="25" transform="rotate(-5 306 337)"/>
    <ellipse cx="382" cy="233" rx="12" ry="27" transform="rotate(62 382 233)"/>
    <ellipse cx="394" cy="277" rx="11" ry="26" transform="rotate(72 394 277)"/>
    <ellipse cx="574" cy="252" rx="13" ry="29" transform="rotate(-35 574 252)"/>
    <ellipse cx="602" cy="292" rx="12" ry="27" transform="rotate(-18 602 292)"/>
    <ellipse cx="614" cy="337" rx="11" ry="25" transform="rotate(5 614 337)"/>
    <ellipse cx="538" cy="233" rx="12" ry="27" transform="rotate(-62 538 233)"/>
    <ellipse cx="526" cy="277" rx="11" ry="26" transform="rotate(-72 526 277)"/>
  </g>

  <!-- candy center -->
  <g filter="url(#softShadow)">
    <circle cx="460" cy="378" r="112" fill="url(#candyGrad)"/>
    <circle cx="460" cy="378" r="96" fill="none" stroke="#ffe0a1" stroke-width="5" opacity="0.9"/>
    <g stroke="#ffe3a8" stroke-width="5" stroke-linecap="round" opacity="0.92">
      <path d="M460 282 L460 474"/>
      <path d="M364 378 L556 378"/>
      <path d="M392 310 L528 446"/>
      <path d="M528 310 L392 446"/>
      <path d="M425 288 L495 468"/>
      <path d="M495 288 L425 468"/>
    </g>
    <circle cx="420" cy="330" r="18" fill="#fff1bc" opacity="0.65"/>
  </g>

  <!-- seigaiha waves -->
  <g fill="none" stroke="#3b2014" stroke-width="18" stroke-linecap="round">
    <path d="M220 530 C270 480 320 480 370 530 C420 480 470 480 520 530 C570 480 620 480 670 530 C710 490 746 483 782 510"/>
    <path d="M250 590 C295 548 340 548 385 590 C430 548 475 548 520 590 C565 548 610 548 655 590 C690 558 722 550 755 570"/>
    <path d="M300 650 C335 620 370 620 405 650 C440 620 475 620 510 650 C545 620 580 620 615 650"/>
  </g>

  <!-- wordmark -->
  <g fill="#3b2014" text-anchor="middle">
    <text x="460" y="805" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="104" font-weight="700" letter-spacing="20">武蔵飴</text>
    <text x="460" y="868" font-family="Georgia, serif" font-size="34" letter-spacing="18" fill="#b66b25">MUSASHI AME</text>
  </g>
</svg>
